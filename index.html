<!DOCTYPE html>
<html lang="vi">
<head>

<title>FOTW-EL · Funnel Library</title>
<style>
:root{
  --bg:#f7f9fa; --card:#fff; --ink:#1c1c1e; --ink2:#6b7280; --line:#e5e7eb;
  --accent:#1f6feb; --accent2:#7c3aed; --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --radius:14px; --nav-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font:15px/1.55 InterVariable,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
a{color:var(--accent);text-decoration:none}
img{max-width:100%}
/* ---- TOP NAV ---- */
.nav{position:sticky;top:0;z-index:50;height:var(--nav-h);background:var(--card);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:0 18px}
.nav .logo{font-weight:800;font-size:17px;letter-spacing:.5px;cursor:pointer;white-space:nowrap}
.nav .logo span{color:var(--accent2)}
.nav .tabs{display:flex;gap:4px;margin-left:8px}
.nav .tab{padding:7px 13px;border-radius:20px;font-size:13.5px;color:var(--ink2);cursor:pointer;font-weight:500}
.nav .tab.on{background:#eef2ff;color:var(--accent)}
.nav .grow{flex:1}
.nav .search{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:7px 13px;min-width:140px;color:var(--ink2);font-size:13px}
.nav .search input{border:0;background:transparent;outline:0;font-size:13.5px;width:100%;color:var(--ink)}
.nav .av{width:32px;height:32px;border-radius:50%;background:var(--accent2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
/* ---- WRAP ---- */
.wrap{max-width:1180px;margin:0 auto;padding:22px 18px 90px}
.hero{background:linear-gradient(120deg,#7c3aed,#db2777);border-radius:var(--radius);padding:30px 28px;color:#fff;margin-bottom:20px;box-shadow:var(--shadow)}
.hero h1{font-size:26px;font-weight:800;margin-bottom:6px}
.hero p{opacity:.92;font-size:14.5px}
/* ---- FILTER CHIPS (premium) ---- */
.chips-wrap{margin-bottom:22px}
.chips-lbl{font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--ink2);margin-bottom:11px;display:flex;align-items:center;gap:7px}
.chips-lbl::before{content:"";width:18px;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px}
.chips{display:flex;gap:9px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 14px;font-size:13.5px;color:#374151;cursor:pointer;
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,border-color .2s,background .2s;white-space:nowrap;user-select:none;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.chip .ico{font-size:15px;line-height:1}
.chip .cnt{font-size:11.5px;font-weight:700;background:var(--bg);color:var(--ink2);border-radius:8px;padding:1px 7px;min-width:20px;text-align:center;transition:.2s}
.chip:hover{border-color:#c7d2fe;transform:translateY(-2px);box-shadow:0 6px 16px rgba(79,70,229,.12)}
.chip.on{background:linear-gradient(135deg,#7c3aed,#4f46e5);border-color:transparent;color:#fff;box-shadow:0 6px 18px rgba(99,102,241,.35);transform:translateY(-1px)}
.chip.on .cnt{background:rgba(255,255,255,.22);color:#fff}
/* ---- GRID ---- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.18s;box-shadow:var(--shadow);display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.10)}
.card .thumb{aspect-ratio:16/10;background:linear-gradient(135deg,#a78bfa,#f0abfc);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card .thumb img{width:100%;height:100%;object-fit:cover}
.card .thumb .em{font-size:46px}
.card .bd{padding:13px 15px}
.card .nm{font-weight:700;font-size:15px;margin-bottom:3px;color:var(--ink)}
.card .ty{font-size:12px;color:var(--ink2)}
.card .badge{position:absolute;top:9px;right:9px;font-size:10px;padding:3px 8px;border-radius:10px;background:#16a34a;color:#fff;font-weight:700;letter-spacing:.3px}
.card .badge.todo{background:rgba(0,0,0,.45);backdrop-filter:blur(4px)}
/* ---- DETAIL (lesson view 2-cột) ---- */
.overlay{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;flex-direction:column}
.overlay.open{display:flex}
.ov-top{height:var(--nav-h);background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 18px;flex-shrink:0}
.ov-top .back{cursor:pointer;font-size:20px;color:var(--ink);padding:4px 8px;border-radius:8px}
.ov-top .back:hover{background:var(--bg)}
.ov-top h2{font-size:16px;font-weight:700}
.ov-top .grow{flex:1}
.ov-body{flex:1;display:flex;overflow:hidden}
.ov-content{flex:1;overflow-y:auto;padding:28px 32px;-webkit-overflow-scrolling:touch}
.ov-content .lhd{color:var(--ink2);font-size:13px;margin-bottom:6px}
.ov-content .ltitle{font-size:23px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.ov-content .ltext{font-size:15.5px;line-height:1.7;white-space:pre-wrap;color:#2c2c2e}
.ov-content .ltext a{color:var(--accent);font-weight:600}
.ov-content img{border-radius:10px;border:1px solid var(--line);margin:14px 0;display:block}
.ov-content .embed{margin:14px 0}
.ov-content iframe{width:100%;height:420px;border:1px solid var(--line);border-radius:10px}
.ov-content .embed-link{display:inline-block;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin:8px 0;font-size:13.5px}
/* curriculum sidebar phải */
.ov-side{width:320px;background:var(--card);border-left:1px solid var(--line);overflow-y:auto;flex-shrink:0}
.ov-side .sh{padding:16px 18px 10px;font-weight:700;font-size:15px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);display:flex;align-items:center;justify-content:space-between}
.sec-block{border-bottom:1px solid var(--line)}
.sec-name{padding:12px 18px 8px;font-weight:700;font-size:13px;color:var(--ink2);text-transform:uppercase;letter-spacing:.4px}
.les-item{padding:9px 18px 9px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13.5px;color:#374151;border-left:3px solid transparent}
.les-item:hover{background:var(--bg)}
.les-item.on{background:#eef2ff;border-left-color:var(--accent);color:var(--accent);font-weight:600}
.les-item .dot{width:16px;height:16px;border:2px solid var(--line);border-radius:50%;flex-shrink:0}
.les-item.on .dot{border-color:var(--accent)}
.nav-arrows{display:flex;gap:8px;margin-left:auto}
.nav-arrows button{width:34px;height:34px;border:1px solid var(--line);background:var(--card);border-radius:8px;cursor:pointer;font-size:15px;color:var(--ink)}
.nav-arrows button:hover{background:var(--bg)}
.nav-arrows button:disabled{opacity:.35;cursor:default}
.empty{color:var(--ink2);font-style:italic;padding:40px 0;text-align:center}
.mob-cur-btn{display:none}
/* ---- RESPONSIVE: TABLET ---- */
@media(max-width:900px){
  .ov-side{width:280px}
  .nav .search{min-width:90px}
}
/* ---- RESPONSIVE: MOBILE ---- */
@media(max-width:680px){
  .nav{gap:8px;padding:0 12px}
  .nav .tabs{display:none}
  .nav .logo{font-size:15px}
  .nav .search{min-width:0;width:38px;padding:7px;justify-content:center}
  .nav .search input{display:none}
  .wrap{padding:16px 12px 80px}
  .hero{padding:22px 18px}
  .hero h1{font-size:21px}
  /* filter: thanh cuộn ngang 1 hàng (native app style) */
  .chips-wrap{margin-bottom:18px;margin-left:-12px;margin-right:-12px}
  .chips-lbl{padding:0 12px}
  .chips{flex-wrap:nowrap;overflow-x:auto;scroll-snap-type:x proximity;padding:2px 12px 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{scroll-snap-align:start;flex-shrink:0;padding:9px 15px}
  .grid{grid-template-columns:1fr 1fr;gap:11px}
  .card .bd{padding:10px 11px}
  .card .nm{font-size:13.5px}
  .card .ty{font-size:11px}
  /* lesson view: content full, curriculum thành drawer */
  .ov-content{padding:18px 16px}
  .ov-content .ltitle{font-size:19px}
  .ov-side{position:fixed;top:var(--nav-h);right:0;bottom:0;width:84%;max-width:340px;transform:translateX(100%);transition:.25s;z-index:120;box-shadow:-4px 0 20px rgba(0,0,0,.15)}
  .ov-side.open{transform:translateX(0)}
  .ov-content iframe{height:300px}
  .mob-cur-btn{display:flex;align-items:center;gap:6px;background:var(--ink);color:#fff;border:0;border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:600}
}
@media(max-width:400px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<script>
const DATA = {"funnels": [{"slug": "nuora", "emoji": "💛", "name": "Nuora", "type": "eCom", "rawType": "eCom Funnel", "thumb": "https://assets-v2.circle.so/8a410fphwr1ev0yqohcxescor8wr", "spaceId": 2689674, "done": true, "sections": [{"name": "Nuora Funnel Breakdown", "lessons": [{"id": 4036288, "title": "🕵️ Funnel Details", "text": "ℹ️ Key details on the funnel\nBrand: Nuora\nWebsite: https://mynuora.com/\nCategory: eCommerce, Supplements\nMinimum order value: $40.99\nAdvertiser profiles: Meta Ads\n\n🔍 Follow the funnel flow below 👇\nZoom in and out to explore all the details of this funnel", "media": [{"type": "embed", "url": "https://miro.com/app/board/uXjVHEsRjkI=/?share_link_id=328145553804"}]}, {"id": 4036289, "title": "📊 Traffic Overview (Similarweb)", "text": "- Monthly Visits: 233.2K\n- Bounce Rate: 44.01%\n- Pages per Visit: 3.36\n- Avg. Visit Duration: 00:01:39\n233K monthly visits is solid for a supplement brand in this niche. For context, most of the brands we cover in the vaginal health and feminine wellness space are sitting between 50K and 300K. What stands out here is the 44% bounce rate, which is actually quite low. That tells me people who land on this site are engaged enough to click deeper, which makes sense when you look at the simplicity of their page structure, there is not much to get lost in.\n🌍 TOP COUNTRIES\n- 🇺🇸 United States: 60.88%\n- 🇩🇪 Germany: 5.39%\n- 🇬🇧 United Kingdom: 4.54%\n- 🇱🇻 Latvia: 3.5%\n- 🇦🇺 Australia: 2.57%\n60.88% US is interesting because that is lower than what we typically see for US-focused DTC supplement brands. COMFRT was at 84%. UNDRDOG at 95%+. Nuora at 60.88% means they are pulling significant traffic from international markets. \nGermany at 5.39% and Latvia at 3.5% jumped out to me. Latvia is a small country, so 3.5% of traffic from there suggests either a concentrated pocket of customers, an affiliate driving traffic, or a founder connection. That is worth investigating because it could signal an untapped European expansion opportunity.\n📈 TRAFFIC SOURCES\n- Direct: 28.47%\n- Referrals: 23.08%\n- Social Paid: 16.48%\n- Search Organic: 12.33%\n- Display Ads: 7.32%\n- Social Organic: 7.22%\n- Search Paid: 3.59%\n- Email: 1.31%\n- Gen AI: 0.2%\n- Affiliate: 0%\nThis traffic mix tells a story. Direct at 28.47% means people are typing mynuora.com into their browser. That is strong brand recall for a brand at this scale. But the number that really caught our eye is referrals at 23.08%. That is the second largest traffic source. For comparison, most DTC brands we cover have referrals under 5%. This suggests Nuora is getting significant traffic from third party review sites, health blogs, or their advertorial funnels, which we will get into later.\nSocial paid at 16.48% is the third largest channel. That is in line with what you would expect for a brand running Meta ads as their primary acquisition channel. But here is the thing: search paid is only 3.59% and email is only 1.31%. That email number is very low. For a brand doing 233K monthly visits, having email at 1.31% means they are leaving significant retention revenue on the table. COMFRT was at 15.52% email. Neurotoned at 42%. Nuora at 1.31% suggests they have not built out their Klaviyo flows yet, which is a massive opportunity.\nGen AI at 0.2% is also interesting. It is a small number but it means people are finding Nuora through AI search. That is going to grow.\n🔍 TOP KEYWORDS\n- nuora: 34.6K traffic, $0.70 CPC\n- mynuora: 4.2K, $2.45\n- mynoura: 1.5K, $0.30\n- nuora gummies: 1.1K, $1.06\n- nuora reviews: 570, $1.18\nEvery single top keyword is branded. 34.6K monthly searches for \"nuora\" at $0.70 CPC is very efficient. The misspelling \"mynoura\" at 1.5K shows that people remember the brand but not the exact spelling, which is a known risk with unique brand names. \"Nuora reviews\" at 570 tells us customers are doing their homework before buying, which makes the advertorial strategy through Dr. Grace Holland even more important.\nWhat is missing is non-branded keyword presence. There is no \"vaginal probiotics\" or \"pineapple gummies for vaginal health\" showing up. That is a search organic opportunity they are not capturing yet.", "media": [{"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCQ0tYb1FvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--fb88ab64410757f04be6324f5659e81e1da33ec1/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/Screenshot%202026-06-16%20at%2014.10.14.png", "name": "Screenshot 2026-06-16 at 14.10.14.png"}, {"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCSG1Yb1FvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--d3f6d79c4042d7277c9f5230012dbf82eff8608a/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/Screenshot%202026-06-16%20at%2014.11.02.png", "name": "Screenshot 2026-06-16 at 14.11.02.png"}, {"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCUHFYb1FvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--5fd3a5a7300caba8875acd557948b804f5efb0e2/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/Screenshot%202026-06-16%20at%2014.12.03.png", "name": "Screenshot 2026-06-16 at 14.12.03.png"}, {"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCQkNab1FvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--7c53c2e24d1a1645ce0d4707d6338fa28a8dabe0/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/Screenshot%202026-06-16%20at%2014.14.02.png", "name": "Screenshot 2026-06-16 at 14.14.02.png"}]}, {"id": 4036402, "title": "🏠 Homepage & Brand Positioning", "text": "🔗 Page URL\n\nThe homepage opens clean. The hero section leads with \"Take Care Of Your Vaginal Health\" and positions Nuora as \"a natural probiotic blend designed to fix odor, dryness, and irritation.\" Simple, direct, no ambiguity about what the product does.\nThe trust stack is strong:\n- 79,238+ women social proof counter\n- 4.8/5 stars with reviews\n- Featured in: Forbes, Vogue, Elle, Marie Claire, InStyle\n- Over 500,000 packs sold\n- 93% of women reported balanced pH\n- 89% reported no vaginal infections\n- 91% reported BV symptoms gone within 4 months\n- 95% reported better vaginal odor\nThe mechanism is introduced early on the homepage: The Pineapple Magic, Reset Protocol, and 24-Hour pH Shield. Their framing is smart because it creates a daily use case, which drives subscription value.\nThey also have a second product, Gut Ritual (digestive comfort and wellness capsules at $49), but the vaginal probiotic gummies are clearly the hero product driving the majority of ad spend. \nWe did notice some copy spacing issues on the homepage. Small detail, but when you are pushing this much volume with skeptical cold traffic, every detail matters.\nAffiliate Program:\nThey offer 25% commission for every order placed with an ambassador's code, plus free products, plus early access to a private product line. This is a similar playbook to what we saw with COMFRT's ambassador program, turning customers into distribution channels.", "media": [{"type": "embed", "url": "https://drive.google.com/open?id=1zntSOPe-mFdAtHdbwgmJRgCck69xTUGn&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/file/d/16qxuO9XGodZEzRq7GOqnrNw7zxoJtwt8/view"}]}, {"id": 4036472, "title": "📱 Meta Ads Strategy", "text": "🔗 Meta Ads Library URL\n\nNuora runs ads across 4 separate Facebook pages, each with a different positioning:\n1. Nuora (main brand page): 182 ads live (30 days), 28 new ads (-67%)\n   - Video: 80.8%, Image: 19.2%\n   - 99+ hooks, 56 ad copy variants, 53 headlines, 15 LPs\n2. Alicia Darling: 464 ads live, 340 new (+82%)\n   - Video: 50.9%, Image: 49.1%\n   - 99+ hooks, 99+ ad copy, 99+ headlines, 28 LPs\n3. Dr. Destiny Robinson: 63 ads live, 0 new\n   - Video: 100%\n   - 60 hooks, 25 ad copy, 18 headlines, 3 LPs\n4. Grace Lindsay: 19 ads live, 3 new\n   - Image: 100%\n   - 6 LPs\nThe Alicia Darling page at 464 ads is running more than double the brand page. Whether she is a real authority figure or a UGC creator playing a role, the strategy is smart: separate the \"medical/authority\" content from the brand page to avoid policy issues and create the appearance of third party endorsement.\nDr. Destiny Robinson's page specifically targets Black women: \"Here is the reason that Black women get BV at twice the rate of white girls.\" This demographic targeting through a separate page with a Black female doctor is very deliberate and very effective. It speaks directly to a segment that has specific health concerns and likely feels underserved by generic messaging.\nMmaybe they're also separating the pages based on the creative side. Some pages are heavier on the video side. Some pages are heavier on the image side. Maybe it also splits the risk. This could be a sensitive topic in terms of Meta advertising policy.\n🎯 CREATIVE ANGLES & WINNING HOOKS\nThe creative strategy breaks down into six distinct angle families:\n1. The \"I Need To Publicly Apologize\" Reverse Hook (longest running, 237 days)\nTheir control ad opens with: \"I need to publicly apologize to anyone who's ever bought Nuora vaginal probiotics before, because I lied.\" Then it reveals the \"lie\" was just that they said 40% off was the best deal, but now it is 65% off. Very catchy hook. \n2. The Biofilm Education Angle\nMultiple ads lead with the mechanism: bacterial biofilms are the hidden cause of recurring vaginal issues. The ads explain that probiotics, boric acid, and antibiotics fail because they cannot break through the biofilm shield. Bromelain from pineapple stems is the only enzyme that dissolves it. \n3. The Timeline/Purge Format\n\"The first two days, discharge will get worse, as your vagina purges the bacterial biofilm waste.\" These ads set expectations by walking the customer through a day-by-day timeline: Day 1-2 purging, Day 5 smell gone, Day 10 full reset. This is powerful because it addresses the biggest objection, \"what if it doesn't work?\", by reframing the initial discomfort as proof that it IS working.\n4. The Ingredient Personification (cartoonish/animated)\nEach ingredient \"introduces itself\" in a fun, animated format. It's a very fun way to learn and also kind of brings down the defense mechanism. \n5. The Authority Figure Long-Form (3-4 minute VSLs)\nDr. Destiny Robinson and Alicia Darling deliver long-form educational content. \"t's almost feels like a mini VSL and it comes up very genuine like they're not trying to sell anything. The bridge to Nuora comes only after the full mechanism explanation.\n6. The Menopause/Gut Angle (via Alicia Darling page)\nTargeting pre-menopause and menopause women with the gut supplement. \"If your belly looks like this, or hips look like this, I want you to see these pictures of me because nothing was working until I learned this.\" This is a separate product (Gut Ritual capsules) pushed through a separate page to a separate audience.\nTop headlines by performance:\n- BUY 1 GET 1 FREE: 32 ads, 237 days (longest running)\n- Rated Excellent 4.8/5: 20 ads, 202 days\n- Our biggest sale of the year!: 14 ads, 196 days\n- The solution for dryness: 11 ads, 52 days\n- Break the cycle: 10 ads, 105 days\n- PRICE GOES BACK UP IN 2 HOURS: 8 ads, 237 days\n- The menobelly fix: 7 ads, 89 days\nWhat stands out is the ads longevity. Multiple ads have been running 200+ days. \"BUY 1 GET 1 FREE\" and \"PRICE GOES BACK UP IN 2 HOURS\" have both been running 237 days. When an ad runs that long, it means it is printing money. You do not leave an ad running for 8 months if it is not profitable.\n🤝 WHO THEY'RE TARGETING\nBased on Atria personas and what we observed across all four pages:\n- 💊 The Wellness Seeker (primary): Women 25-55 who have tried multiple solutions and are frustrated. \n- 🩺 The Health Optimizer: Women who want science-backed, ingredient-transparent solutions\n- 👵 The Mature Explorer: Pre-menopause and menopause women dealing with hormonal changes (targeted with the gut product through Alicia Darling page)\n- 🎯 The Results Seeker: Women who need proof it works before buying (\"nuora reviews\" keyword at 570 searches)\n- ✊ The Underserved Segment: Black women specifically (targeted through Dr. Destiny Robinson's page with stats about BV rates)\n- 💪 The Biohacker: Women interested in biofilm science, mechanism-driven solutions\n🔬 THE PAIN POINTS & MECHANISM\nThe core mechanism is bacterial biofilm dissolution through bromelain (pineapple enzymes). Here is how they explain it across their ads:\nThe Problem:\n- Bad bacteria form a protective shield (biofilm) inside the vaginal microbiome\n- Regular probiotics, boric acid, and antibiotics cannot break through this shield\n- They only clean the surface while the biofilm sits intact underneath\n- That is why the smell, discharge, and discomfort keep coming back\nThe Solution (3 ingredients working together):\n1. Bromelain (from Australian queen pineapple stems, freeze-dried for 2x potency): Dissolves the biofilm\n2. Bacillus coagulans 1969: A spore-forming probiotic that survives stomach acid and reaches the vaginal tissue alive, then recolonizes healthy bacteria\n3. Pectin: Feeds the good bacteria so they actually stick around long-term\nWhat makes this mechanism work from a copywriting perspective is the comparison: \"Like how teeth get plaque. No matter how much you rinse, the plaque doesn't come off until something actually dissolves it. Well, biofilm works the same way.\"", "media": [{"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCTEN2b1FvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--33a39173a369cc82f3acf9c0badc684a9db27647/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/image.png", "name": "image.png"}, {"type": "embed", "url": "https://drive.google.com/open?id=1eelP4UZ77MfGm3vRGivfu9UlR0GCI4j_&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/open?id=1CwOsISFzPvag8OOMnKxySuIKL-TgZv23&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/open?id=12hyxEZIU7iLe9imY8GJWzHyE0O5S0IuD&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/open?id=1Ngn_pkAb3rNL7mVKgmqS_LhtudDWURyV&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/open?id=1-B6fxiY7ESMIluw-OhzMKw1oR9oFZmKW&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/open?id=1nWlbSJufIy6O0b3gMbDMA4Ru3U9nvY9Y&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/file/d/1ICwBmb09H_MIYIyADLgBgKwGb7B_gEKE/view?usp=sharing"}, {"type": "embed", "url": "https://drive.google.com/open?id=1a6KZln7L7i_gnY4PnZwOgkmzOea3tC6L&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/open?id=1yVgDrdpEDB32WwO_GAJ_egfrKg3ahJ_p&usp=drive_copy"}]}, {"id": 4042311, "title": "📺 Google/YouTube Ads", "text": "🔗 Google Ads Transparency URL\nTotal across all Google platforms: ~400 ads. \nThey push both the feminine gummies and the gut supplement across Google Search, Shopping, and YouTube. The headlines are a mix of branded search captures (\"Nuora Official Site\"), problem-aware (\"Helps Fight BV & Yeast\"), and category plays (\"Top 5 Vaginal Gummies 2026\").", "media": [{"type": "embed", "url": "https://drive.google.com/open?id=1x_pNdVDEL4aaFh1AhBGMvslEurcPE8ZL&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/open?id=1pMCavc3lCEpkxYdXYZifwL2Qb6wBg12f&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/open?id=1GaXzfi_2V35Y_D7t_83vS5Z3jVFK1sZJ&usp=drive_copy"}]}, {"id": 4042316, "title": "🎵 TikTok Presence", "text": "Nuora has no significant TikTok presence. \nSearching \"nuora gummies\" on TikTok shows very few results. We think they should be there because if you're at this scale you should definitely try to dominate TikTok as well. Otherwise you risk having copycats.", "media": []}, {"id": 4042321, "title": "🛒 Amazon Presence", "text": "Nuora is not on Amazon, and copycats have filled the gap. We are seeing very similar type gummies that they're selling. Same setup, packaging, and it's not them because they're not on Amazon.\"\nIt's unfortunate but it is what it is. This is the Amazon game.", "media": [{"type": "embed", "url": "https://drive.google.com/open?id=1v3o84Obvl_38kT3enshUx1qcRzyzcvXS&usp=drive_copy"}]}]}, {"name": "Sales Flow", "lessons": [{"id": 4036686, "title": "Landing Page", "text": "🔗 Page URL\nWinner LP: mynuora.com/products/gummies (67.3% of all ad traffic, 442 ads, 248 days longest running)\nTop LPs by traffic share:\n- /products/gummies: 67.3% (442 ads)\n- /products/feminine-balance-gummies-1: 6.5% (43 ads, 207 days)\n- /pages/gut-capsule: 6.4% (42 ads, 133 days)\n- /pages/gut-capsule-2: 4.1% (27 ads)\n- /pages/feminine-gummies-3: 2.9% (19 ads)\n- Homepage: 2.0% (13 ads, 185 days)\n- Various advertorial pages: ~5%\n67.3% of all traffic going to a single PDP is very concentrated. They are not spreading traffic across 99 landing pages like Gruns. They have one winner and they are feeding it.\nAdvertorial Pages (via Grace Lindsay):\nThis was the most interesting discovery. Grace Lindsay's page runs ads that send traffic to top-health-insider.com, a site built to look like an independent health review site. It features \"Dr. Grace Holland,\" described as \"a board-certified OB-GYN with more than 15 years of clinical practice focused exclusively on women's reproductive and hormonal health.\"\nThe headline on one advertorial: \"This OB/GYN Found Why 73% of Women with Recurring BV and Vaginal Odor Never Find Relief.\" Very specific stat-driven headline speaking to a highly educated, highly skeptical audience.\nThey also run listicle-style pages: \"5 Reasons Women Are Loving These Natural High-Potency Probiotic Gummies\" and a variation \"Cured 1.5 years of recurrent BV & yeast infections!\" that opens with personal testimony.\nPDP (Product Detail Page):\nThe PDP is standard Shopify. Clean, not over-engineered. One pack at $34.99, two packs at $77.99, three packs at $83.99. \n⚠️ Some issues:\n- PDP offer layout could be clearer with per-pack pricing\n- Subscription checkbox is pre-checked and not clearly labeled as a subscription. \n\nFull PDP Screenshot \nPop-Up Flow (Gamified)\nThey use a gamified scratch card pop-up that we have been seeing become very common with DTC brands. The flow: scratch card → email entry → phone number entry (for SMS) → discount revealed. This is a two-step opt-in that captures both email and phone, feeding both Klaviyo email and SMS flows.\nStep 1\nStep 2\nStep 3\nStep 4\nStep 5", "media": [{"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCRVU1cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--c69fdf27e6730f3452f6c88af2b91d0a07274659/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/1.%20PDP.png", "name": "1. PDP.png"}, {"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCQVk2cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--804d273a2d47c3c9a83b4b89c5ab25632ee16c11/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/NUORA%20-%20POP%20UP%20PART%201.png", "name": "NUORA - POP UP PART 1.png"}, {"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCQ002cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--b6b6d648c545fe6c969c947c89717eeac3aeeb31/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/NUORA%20-%20POP%20UP%20PART%202.png", "name": "NUORA - POP UP PART 2.png"}, {"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCRFE2cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--7a969677323677481db67be9f896ac134e2c6a9a/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/NUORA%20-%20POP%20UP%20PART%203.png", "name": "NUORA - POP UP PART 3.png"}, {"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCRjA2cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--23d32373624a64a2383961700989538874f358bb/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/NUORA%20-%20POP%20UP%20PART%204.png", "name": "NUORA - POP UP PART 4.png"}, {"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCSDA2cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--8c38c1c278821373a7c0f466b6d227ab8ac48760/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/NUORA%20-%20POP%20UP%20PART%205.png", "name": "NUORA - POP UP PART 5.png"}, {"type": "embed", "url": "https://drive.google.com/open?id=1obvUCOmubzKjed4Qc4r67N1E-W_06ypA&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/open?id=1du_KYlpOZXAqnDPUP3eHGAqahQJCdUg1&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/open?id=198KkaYpc2XkcPLUx5rtHsR9cAZr71CJp&usp=drive_copy"}, {"type": "embed", "url": "https://drive.google.com/open?id=1Q5cdCTI3AIPYEabqoWzoAR65H_VWTIXC&usp=drive_copy"}]}, {"id": 4036688, "title": "On-Page Cart", "text": "🔗 Page URL\nFront end offer:\n- 1 Pack (30 servings): $34.99 (US price)\n- 2 Packs: $77.99\n- 3 Packs: $83.99\n- Subscription: Pre-checked, saves additional %\n- Shipping: Free\n- 60-Day Money Back Guarantee\n- Cart: No upsell, no cross-sell, clean cart", "media": [{"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCTXM3cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--4af62f2f2e0c0c150685df38fa5949dd60322264/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/2.%20CART.png", "name": "2. CART.png"}]}, {"id": 4036689, "title": "Checkout Page", "text": "🔗 Page URL", "media": [{"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCRU04cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--e7b8d60896ff94459c53e88bdf9a9e461a195f8a/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/3.%20CHECKOUT.png", "name": "3. CHECKOUT.png"}]}, {"id": 4042284, "title": "Upsell #1", "text": "OTO 1: \"The Founder Birthday BOGO\"\nThe copy reads: \"Oh Ian... You know what?!!! I'm Evelyn, the founder. And you are my 602nd customer today! So now you might be asking me: So what now? Well... 602 = 06/02, which is the 6th of February (the 2nd month of the year). And that just happens to be my birthday! So, I decided that for every 602nd customer of Nuora, we are going to celebrate it BIG.\"\nThe offer: Buy 1 + 1 Free at $38.28 (67% off)\n- Social proof: Facebook comments from \"Isabella Mendes\" (gynecologist endorsement) and \"Megan Blazovic\" (customer comparison to competitors)\n- Countdown timer with urgency", "media": [{"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCRXM5cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--71588e8150ee032fe3b95f492f9495bf7d13dfd3/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/4.%20OTO%201%20Buy%20One%20Plus%20One%20Free.png", "name": "4. OTO 1 Buy One Plus One Free.png"}]}, {"id": 4042286, "title": "Downsell #1", "text": "OTO 2 (Downsell): \"75% Instant Discount\"\nIf you wait or attempt to decline OTO 1, the page shifts to: \"Oh my God, Ian! Ok I understand. It might still feel too expensive. But it's unfair to leave you without insane benefits...\"\nThe offer drops to: $14.50 (75% off from $57.99)\n- Same social proof comments\n- Even more aggressive urgency with countdown", "media": [{"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCRDQrcFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--0288713f820cc03e9c1282de1f3c60213ec5b608/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/5.%20OTO%202%20Downsell%20Page.png", "name": "5. OTO 2 Downsell Page.png"}]}, {"id": 4042289, "title": "Thank You Page", "text": "Final order total: $49.49 (Biofilm Probiotic $34.99 + Vaginal Probiotic $14.50)\n- Total savings displayed: $57.79\n- Subscription auto-enrolled for both items\n\nOn the thank you page, \"Evelyn, the founder\" runs a survey: \"Hey, my queen! I'm Evelyn, the founder of Nuora. Every month, I send $200 to ladies who answer these QUICK questions. First question: How excited are you about trying Nuora?\"\nThe incentive ($200/month to random respondents) is a smart move to boost completion rates. They also offer a 14-day Daily5 sample (a different supplement) through a quiz, which serves as both a cross-sell and a data collection mechanism.", "media": [{"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCT0UrcFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--40302e11b64d23298252ef1376dbd4f472e00890/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/6.%20Thank%20You%20Page%20(Blurred).png", "name": "6. Thank You Page (Blurred).png"}]}]}, {"name": "Additional Files & Materials", "lessons": [{"id": 4042299, "title": "Funnel Takeaways", "text": "1. One mechanism, relentlessly repeated. Every single ad, across all four pages, leads with the same mechanism: biofilm dissolution through bromelain. They do not try to invent new angles. They found the one thing that resonates, the science behind why nothing else works, and they hammer it from every direction: authority figures, UGC creators, animations, long-form VSLs, and advertorials.\n2. The multi-page strategy is about audience segmentation, not just risk. Nuora main page speaks to the general audience. Alicia Darling targets women who respond to authority figures. Dr. Destiny Robinson speaks specifically to Black women. Grace Lindsay drives traffic to native advertorials. Each page is a different door into the same funnel.\n3. The advertorial through top-health-insider.com is their most sophisticated asset. A board-certified OB-GYN reviewing the product on what appears to be an independent health site. The funnels that look native definitely win a lot at scale because they can capture audiences that are both skeptical and non-skeptical.\n4. The founder birthday OTO is genuinely creative. \"602 = 06/02 = February 6th = my birthday\" is the kind of OTO copy that makes you smile instead of feeling sold to. It transforms a standard BOGO upsell into a personal moment with the founder. Every brand should study this as an alternative to the generic \"WAIT! Before you go...\" post purchase page.\n5. They are leaving money on the table with email at 1.31%. This is the biggest gap in the funnel. At 233K monthly visits with a gamified pop-up capturing emails and phone numbers, they should be driving significantly more revenue through Klaviyo flows. If they built out a proper welcome series, abandon cart, post-purchase, and win-back sequence, email could easily be 10-15% of traffic within 90 days.\n6. No TikTok and no Amazon is a risk. When you have a product this easy to copy (gummies in a pouch), not being on TikTok and Amazon means copycats will fill that space. Someone searching \"nuora\" on TikTok or Amazon should find Nuora, not a knock-off brand with similar packaging and lower prices.\n7. The pre-checked subscription is a double-edged sword. It likely boosts subscription enrollment rates, but \"it's very difficult to understand that I am actually subscribing because this almost looks like just a check mark.\" This can drive chargebacks and trust issues. The short-term revenue gain may not be worth the long-term customer satisfaction cost.\n8. 67.3% of ad traffic to one PDP is both a strength and a vulnerability. It means they have a clear winner and they are scaling it hard. But it also means a single page change, policy violation, or conversion dip affects two-thirds of their paid acquisition. Testing a second winner LP should be a priority.\n9. Their ad longevity is exceptional. Multiple ads running 200+ days. \"BUY 1 GET 1 FREE\" at 237 days. \"PRICE GOES BACK UP IN 2 HOURS\" at 237 days. This tells you the creative is not burning out, which means either the audience is large enough to sustain frequency, or the ads are genuinely engaging enough that people do not fatigue on them.\n10. The 65% off front-end pricing is strategic for a skeptical audience. The deep discount removes the financial risk for a customer who has already been burned.", "media": []}, {"id": 4042301, "title": "Cancellation Flow", "text": "Step 1\nStep 2\nStep 3\nStep 4\nStep 5\nStep 6\nStep 7\nStep 8\nStep 9\nStep 10", "media": [{"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCQmxJcFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--33c58a473529d3785841576cb503151672dfaae7/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/Step%201.png", "name": "Step 1.png"}, {"type": "img", "url": "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCRFpJcFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--9529752a04fa9e01fb1a2121c1861b7d58d85631/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdCem9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2Q25OaGRtVnlld1k2Q25OMGNtbHdWQT09IiwiZXhwIjpudWxsLCJwdXIiOiJ2YXJpYXRpb24ifX0=--c94871ba5479e24de62982019557cdcc73e92248/Step%202.png", "name": "Step 2.png"}, {"type": "img", "url": "https://app.circle.so/rails/active_st let activeType="all", search="", curFunnel=null, flatLessons=[], curIdx=0;

const TYPE_ICON={"eCom":"🛒","Info Product":"📘","Quiz":"❓","Advertorial":"📰","VSL":"🎬","eCom Quiz":"🛒","Advertorial Quiz":"📰","Book":"📚","SaaS":"💻","Call":"📞","Agency":"🏢","Lead Gen":"🎯"};
function typeCounts(){const c={};DATA.funnels.forEach(f=>c[f.type]=(c[f.type]||0)+1);return c;}
function renderChips(){
  const c=typeCounts(), types=Object.keys(c).sort((a,b)=>c[b]-c[a]);
  const all=`<span class="chip ${activeType==='all'?'on':''}" onclick="setType('all')"><span class="ico">🗂️</span>Tất cả<span class="cnt">${DATA.funnels.length}</span></span>`;
  document.getElementById("chips").innerHTML=all+
    types.map(t=>`<span class="chip ${activeType===t?'on':''}" onclick="setType('${t}')"><span class="ico">${TYPE_ICON[t]||'📋'}</span>${t}<span class="cnt">${c[t]}</span></span>`).join("");
}
function setType(t){activeType=t;renderChips();renderGrid();}
function onSearch(v){search=v.toLowerCase();renderGrid();}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function linkify(s){return esc(s).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');}
function renderGrid(){
  let list=DATA.funnels.filter(f=>activeType==="all"||f.type===activeType);
  if(search) list=list.filter(f=>f.name.toLowerCase().includes(search)||f.rawType.toLowerCase().includes(search));
  document.getElementById("grid").innerHTML=list.map(f=>`
    <div class="card" onclick="openDetail('${f.slug}')">
      <div class="thumb">
        <div class="badge ${f.done?'':'todo'}">${f.done?'✓ Full':'list'}</div>
        ${f.thumb?`<img src="${f.thumb}" loading="lazy" onerror="this.style.display='none';this.parentNode.innerHTML+='<div class=em>${f.emoji||'📋'}</div>'">`:`<div class="em">${f.emoji||'📋'}</div>`}
      </div>
      <div class="bd"><div class="nm">${f.emoji||''} ${f.name}</div><div class="ty">${f.rawType}</div></div>
    </div>`).join("")||`<div class="empty">Không có funnel khớp.</div>`;
}
function openDetail(slug){
  const f=DATA.funnels.find(x=>x.slug===slug); curFunnel=f;
  document.getElementById("ovTitle").textContent=(f.emoji||'')+" "+f.name;
  const ov=document.getElementById("overlay"); ov.classList.add("open");
  if(!f.done||!f.sections){
    document.getElementById("ovSide").innerHTML="";
    document.getElementById("ovContent").innerHTML=`<div class="empty">📋 Breakdown chi tiết chưa scrape.<br><br>Loại: ${f.rawType}</div>`;
    return;
  }
  // flatten lessons
  flatLessons=[]; f.sections.forEach((s,si)=>s.lessons.forEach((l,li)=>flatLessons.push({...l,section:s.name,si,li})));
  curIdx=0; renderSide(); renderLesson();
}
function renderSide(){
  const f=curFunnel;
  let html=`<div class="sh">Lessons <span style="cursor:pointer;color:var(--ink2)" onclick="toggleCur()" class="mob-only">✕</span></div>`;
  f.sections.forEach((s,si)=>{
    html+=`<div class="sec-block"><div class="sec-name">${s.name}</div>`;
    s.lessons.forEach((l,li)=>{
      const idx=flatLessons.findIndex(x=>x.si===si&&x.li===li);
      html+=`<div class="les-item ${idx===curIdx?'on':''}" data-idx="${idx}" onclick="goLesson(${idx})"><span class="dot"></span>${l.title}</div>`;
    });
    html+=`</div>`;
  });
  document.getElementById("ovSide").innerHTML=html;
}
function renderLesson(){
  const l=flatLessons[curIdx]; if(!l)return;
  let media=(l.media||[]).map(m=>{
    if(m.type==='img')return `<img src="${m.url}" loading="lazy">`;
    if(/youtube|youtu\.be|vimeo|loom/.test(m.url))return `<div class="embed"><iframe src="${m.url.replace('watch?v=','embed/')}" loading="lazy" allowfullscreen></iframe></div>`;
    if(/drive\.google/.test(m.url)){const id=(m.url.match(/[-\w]{25,}/)||[])[0];return id?`<div class="embed"><iframe src="https://drive.google.com/file/d/${id}/preview" loading="lazy"></iframe></div>`:`<a class="embed-link" href="${m.url}" target="_blank">📎 ${m.url.slice(0,50)}</a>`;}
    return `<a class="embed-link" href="${m.url}" target="_blank">🔗 ${m.url.slice(0,55)}</a>`;
  }).join("");
  document.getElementById("ovContent").innerHTML=`
    <div class="lhd">Lesson ${curIdx+1} of ${flatLessons.length} · ${l.section}</div>
    <div class="ltitle">${l.title}</div>
    <div class="ltext">${linkify(l.text)||'<span style="color:var(--ink2)">(Lesson chủ yếu hình ảnh bên dưới)</span>'}</div>
    ${media}`;
  document.getElementById("ovContent").scrollTop=0;
  document.getElementById("prevBtn").disabled=curIdx===0;
  document.getElementById("nextBtn").disabled=curIdx===flatLessons.length-1;
  document.querySelectorAll(".les-item").forEach(e=>e.classList.toggle("on",+e.dataset.idx===curIdx));
}
function goLesson(i){curIdx=i;renderLesson();if(window.innerWidth<=680)document.getElementById("ovSide").classList.remove("open");}
function step(d){const n=curIdx+d;if(n>=0&&n<flatLessons.length){curIdx=n;renderLesson();}}
function toggleCur(){document.getElementById("ovSide").classList.toggle("open");}
function closeDetail(){document.getElementById("overlay").classList.remove("open");}
document.addEventListener("keydown",e=>{if(!document.getElementById("overlay").classList.contains("open"))return;if(e.key==="ArrowLeft")step(-1);if(e.key==="ArrowRight")step(1);if(e.key==="Escape")closeDetail();});
document.getElementById("heroSub").textContent=`${DATA.meta.total} funnel DTC · ${DATA.meta.scraped} breakdown đầy đủ · clone nội bộ`;
renderChips();renderGrid();
</script>
