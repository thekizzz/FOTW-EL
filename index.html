bHMiOnsibWVzc2FnZSI6IkJBaDdDRG9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2RkhKbGMybDZaVjkwYjE5c2FXMXBkRnNIYVFJNEJEQTZDbk5oZG1WeWV3WTZDbk4wY21sd1ZBPT0iLCJleHAiOm51bGwsInB1ciI6InZhcmlhdGlvbiJ9fQ==--7535ef66ff04b52d1ea165e904a77a64f9cc7389/Screenshot%202026-06-16%20at%2014.14.02.png"], "iframes": []}, {"title": "Homepage & Brand Positioning", "text": "Lesson 3 of 18 🏠 Homepage & Brand Positioning 🔗 Page URL The homepage opens clean. The hero section leads with \"Take Care Of Your Vaginal Health\" and positions Nuora as \"a natural probiotic blend designed to fix odor, dryness, and irritation.\" Simple, direct, no ambiguity about what the product does. The trust stack is strong: - 79,238+ women social proof counter - 4.8/5 stars with reviews - Featured in: Forbes, Vogue, Elle, Marie Claire, InStyle - Over 500,000 packs sold - 93% of women reported balanced pH - 89% reported no vaginal infections - 91% reported BV symptoms gone within 4 months - 95% reported better vaginal odor The mechanism is introduced early on the homepage: The Pineapple Magic, Reset Protocol, and 24-Hour pH Shield. Their framing is smart because it creates a daily use case, which drives subscription value. They also have a second product, Gut Ritual (digestive comfort and wellness capsules at $49), but the vaginal probiotic gummies are clearly the hero product driving the majority of ad spend. We did notice some copy spacing issues on the homepage. Small detail, but when you are pushing this much volume with skeptical cold traffic, every detail matters. Affiliate Program: They offer 25% commission for every order placed with an ambassador's code, plus free products, plus early access to a private product line. This is a similar playbook to what we saw with COMFRT's ambassador program, turning customers into distribution channels.", "images": [], "iframes": ["https://drive.google.com/file/d/1zntSOPe-mFdAtHdbwgmJRgCck69xTUGn/preview", "https://drive.google.com/file/d/16qxuO9XGodZEzRq7GOqnrNw7zxoJtwt8/preview"]}, {"title": "Meta Ads Strategy", "text": "Lesson 4 of 18 📱 Meta Ads Strategy 🔗 Meta Ads Library URL Nuora runs ads across 4 separate Facebook pages, each with a different positioning: 1. Nuora (main brand page): 182 ads live (30 days), 28 new ads (-67%) - Video: 80.8%, Image: 19.2% - 99+ hooks, 56 ad copy variants, 53 headlines, 15 LPs 2. Alicia Darling: 464 ads live, 340 new (+82%) - Video: 50.9%, Image: 49.1% - 99+ hooks, 99+ ad copy, 99+ headlines, 28 LPs 3. Dr. Destiny Robinson: 63 ads live, 0 new - Video: 100% - 60 hooks, 25 ad copy, 18 headlines, 3 LPs 4. Grace Lindsay: 19 ads live, 3 new - Image: 100% - 6 LPs The Alicia Darling page at 464 ads is running more than double the brand page. Whether she is a real authority figure or a UGC creator playing a role, the strategy is smart: separate the \"medical/authority\" content from the brand page to avoid policy issues and create the appearance of third party endorsement. Dr. Destiny Robinson's page specifically targets Black women: \"Here is the reason that Black women get BV at twice the rate of white girls.\" This demographic targeting through a separate page with a Black female doctor is very deliberate and very effective. It speaks directly to a segment that has specific health concerns and likely feels underserved by generic messaging. Mmaybe they're also separating the pages based on the creative side. Some pages are heavier on the video side. Some pages are heavier on the image side. Maybe it also splits the risk. This could be a sensitive topic in terms of Meta advertising policy. 🎯 CREATIVE ANGLES & WINNING HOOKS The creative strategy breaks down into six distinct angle families: 1. The \"I Need To Publicly Apologize\" Reverse Hook (longest running, 237 days) Their control ad opens with: \"I need to publicly apologize to anyone who's ever bought Nuora vaginal probiotics before, because I lied.\" Then it reveals the \"lie\" was just that they said 40% off was the best deal, but now it is 65% off. Very catchy hook. 2. The Biofilm Education Angle Multiple ads lead with the mechanism: bacterial biofilms are the hidden cause of recurring vaginal issues. The ads explain that probiotics, boric acid, and antibiotics fail because they cannot break through the biofilm shield. Bromelain from pineapple stems is the only enzyme that dissolves it. 3. The Timeline/Purge Format \"The first two days, discharge will get worse, as your vagina purges the bacterial biofilm waste.\" These ads set expectations by walking the customer through a day-by-day timeline: Day 1-2 purging, Day 5 smell gone, Day 10 full reset. This is powerful because it addresses the biggest objection, \"what if it doesn't work?\", by reframing the initial discomfort as proof that it IS working. 4. The Ingredient Personification (cartoonish/animated) Each ingredient \"introduces itself\" in a fun, animated format. It's a very fun way to learn and also kind of brings down the defense mechanism. 5. The Authority Figure Long-Form (3-4 minute VSLs) Dr. Destiny Robinson and Alicia Darling deliver long-form educational content. \"t's almost feels like a mini VSL and it comes up very genuine like they're not trying to sell anything. The bridge to Nuora comes only after the full mechanism explanation. 6. The Menopause/Gut Angle (via Alicia Darling page) Targeting pre-menopause and menopause women with the gut supplement. \"If your belly looks like this, or hips look like this, I want you to see these pictures of me because nothing was working until I learned this.\" This is a separate product (Gut Ritual capsules) pushed through a separate page to a separate audience. Top headlines by performance: - BUY 1 GET 1 FREE: 32 ads, 237 days (longest running) - Rated Excellent 4.8/5: 20 ads, 202 days - Our biggest sale of the year!: 14 ads, 196 days - The solution for dryness: 11 ads, 52 days - Break the cycle: 10 ads, 105 days - PRICE GOES BACK UP IN 2 HOURS: 8 ads, 237 days - The menobelly fix: 7 ads, 89 days What stands out is the ads longevity. Multiple ads have been running 200+ days. \"BUY 1 GET 1 FREE\" and \"PRICE GOES BACK UP IN 2 HOURS\" have both been running 237 days. When an ad runs that long, it means it is printing money. You do not leave an ad running for 8 months if it is not profitable. 🤝 WHO THEY'RE TARGETING Based on Atria personas and what we observed across all four pages: - 💊 The Wellness Seeker (primary): Women 25-55 who have tried multiple solutions and are frustrated. - 🩺 The Health Optimizer: Women who want science-backed, ingredient-transparent solutions - 👵 The Mature Explorer: Pre-menopause and menopause women dealing with hormonal changes (targeted with the gut product through Alicia Darling page) - 🎯 The Results Seeker: Women who need proof it works before buying (\"nuora reviews\" keyword at 570 searches) - ✊ The Underserved Segment: Black women specifically (targeted through Dr. Destiny Robinson's page with stats about BV rates) - 💪 The Biohacker: Women interested in biofilm science, mechanism-driven solutions 🔬 THE PAIN POINTS & MECHANISM The core mechanism is bacterial biofilm dissolution through bromelain (pineapple enzymes). Here is how they explain it across their ads: The Problem: - Bad bacteria form a protective shield (biofilm) inside the vaginal microbiome - Regular probiotics, boric acid, and antibiotics cannot break through this shield - They only clean the surface while the biofilm sits intact underneath - That is why the smell, discharge, and discomfort keep coming back The Solution (3 ingredients working together): 1. Bromelain (from Australian queen pineapple stems, freeze-dried for 2x potency): Dissolves the biofilm 2. Bacillus coagulans 1969: A spore-forming probiotic that survives stomach acid and reaches the vaginal tissue alive, then recolonizes healthy bacteria 3. Pectin: Feeds the good bacteria so they actually stick around long-term What makes this mechanism work from a copywriting perspective is the comparison: \"Like how teeth get plaque. No matter how much you rinse, the plaque doesn't come off until something actually dissolves it. Well, biofilm works the same way.\"", "images": ["https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCTEN2b1FvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--33a39173a369cc82f3acf9c0badc684a9db27647/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdDRG9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2RkhKbGMybDZaVjkwYjE5c2FXMXBkRnNIYVFJNEJEQTZDbk5oZG1WeWV3WTZDbk4wY21sd1ZBPT0iLCJleHAiOm51bGwsInB1ciI6InZhcmlhdGlvbiJ9fQ==--7535ef66ff04b52d1ea165e904a77a64f9cc7389/image.png"], "iframes": ["https://drive.google.com/file/d/1eelP4UZ77MfGm3vRGivfu9UlR0GCI4j_/preview", "https://drive.google.com/file/d/1CwOsISFzPvag8OOMnKxySuIKL-TgZv23/preview", "https://drive.google.com/file/d/12hyxEZIU7iLe9imY8GJWzHyE0O5S0IuD/preview", "https://drive.google.com/file/d/1Ngn_pkAb3rNL7mVKgmqS_LhtudDWURyV/preview", "https://drive.google.com/file/d/1-B6fxiY7ESMIluw-OhzMKw1oR9oFZmKW/preview", "https://drive.google.com/file/d/1nWlbSJufIy6O0b3gMbDMA4Ru3U9nvY9Y/preview"]}, {"title": "Google/YouTube Ads", "text": "Lesson 5 of 18 📺 Google/YouTube Ads 🔗 Google Ads Transparency URL Total across all Google platforms: ~400 ads. They push both the feminine gummies and the gut supplement across Google Search, Shopping, and YouTube. The headlines are a mix of branded search captures (\"Nuora Official Site\"), problem-aware (\"Helps Fight BV & Yeast\"), and category plays (\"Top 5 Vaginal Gummies 2026\").", "images": [], "iframes": ["https://drive.google.com/file/d/1x_pNdVDEL4aaFh1AhBGMvslEurcPE8ZL/preview", "https://drive.google.com/file/d/1pMCavc3lCEpkxYdXYZifwL2Qb6wBg12f/preview", "https://drive.google.com/file/d/1GaXzfi_2V35Y_D7t_83vS5Z3jVFK1sZJ/preview"]}, {"title": "TikTok Presence", "text": "Lesson 6 of 18 🎵 TikTok Presence Nuora has no significant TikTok presence. Searching \"nuora gummies\" on TikTok shows very few results. We think they should be there because if you're at this scale you should definitely try to dominate TikTok as well. Otherwise you risk having copycats.", "images": [], "iframes": []}, {"title": "Amazon Presence", "text": "Lesson 7 of 18 🛒 Amazon Presence Nuora is not on Amazon, and copycats have filled the gap. We are seeing very similar type gummies that they're selling. Same setup, packaging, and it's not them because they're not on Amazon.\" It's unfortunate but it is what it is. This is the Amazon game.", "images": [], "iframes": ["https://drive.google.com/file/d/1v3o84Obvl_38kT3enshUx1qcRzyzcvXS/preview"]}]}, {"name": "Sales Flow", "lessons": [{"title": "Landing Page", "text": "Lesson 8 of 18 Landing Page 🔗 Page URL Winner LP: mynuora.com/products/gummies (67.3% of all ad traffic, 442 ads, 248 days longest running) Top LPs by traffic share: - /products/gummies: 67.3% (442 ads) - /products/feminine-balance-gummies-1: 6.5% (43 ads, 207 days) - /pages/gut-capsule: 6.4% (42 ads, 133 days) - /pages/gut-capsule-2: 4.1% (27 ads) - /pages/feminine-gummies-3: 2.9% (19 ads) - Homepage: 2.0% (13 ads, 185 days) - Various advertorial pages: ~5% 67.3% of all traffic going to a single PDP is very concentrated. They are not spreading traffic across 99 landing pages like Gruns. They have one winner and they are feeding it. Advertorial Pages (via Grace Lindsay): This was the most interesting discovery. Grace Lindsay's page runs ads that send traffic to top-health-insider.com, a site built to look like an independent health review site. It features \"Dr. Grace Holland,\" described as \"a board-certified OB-GYN with more than 15 years of clinical practice focused exclusively on women's reproductive and hormonal health.\" The headline on one advertorial: \"This OB/GYN Found Why 73% of Women with Recurring BV and Vaginal Odor Never Find Relief.\" Very specific stat-driven headline speaking to a highly educated, highly skeptical audience. They also run listicle-style pages: \"5 Reasons Women Are Loving These Natural High-Potency Probiotic Gummies\" and a variation \"Cured 1.5 years of recurrent BV & yeast infections!\" that opens with personal testimony. PDP (Product Detail Page): The PDP is standard Shopify. Clean, not over-engineered. One pack at $34.99, two packs at $77.99, three packs at $83.99. ⚠️ Some issues: - PDP offer layout could be clearer with per-pack pricing - Subscription checkbox is pre-checked and not clearly labeled as a subscription. Full PDP Screenshot Pop-Up Flow (Gamified) They use a gamified scratch card pop-up that we have been seeing become very common with DTC brands. The flow: scratch card → email entry → phone number entry (for SMS) → discount revealed. This is a two-step opt-in that captures both email and phone, feeding both Klaviyo email and SMS flows. Step 1 Step 2 Step 3 Step 4 Step 5", "images": ["https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCRVU1cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--c69fdf27e6730f3452f6c88af2b91d0a07274659/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdDRG9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2RkhKbGMybDZaVjkwYjE5c2FXMXBkRnNIYVFJNEJEQTZDbk5oZG1WeWV3WTZDbk4wY21sd1ZBPT0iLCJleHAiOm51bGwsInB1ciI6InZhcmlhdGlvbiJ9fQ==--7535ef66ff04b52d1ea165e904a77a64f9cc7389/1.%20PDP.png", "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCQVk2cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--804d273a2d47c3c9a83b4b89c5ab25632ee16c11/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdDRG9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2RkhKbGMybDZaVjkwYjE5c2FXMXBkRnNIYVFJNEJEQTZDbk5oZG1WeWV3WTZDbk4wY21sd1ZBPT0iLCJleHAiOm51bGwsInB1ciI6InZhcmlhdGlvbiJ9fQ==--7535ef66ff04b52d1ea165e904a77a64f9cc7389/NUORA%20-%20POP%20UP%20PART%201.png", "https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCQ002cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--b6b6d648c545fe6c969c947c89717eeac3aeeb31/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdDRG9MWm05eWJXRjBTU0lJY0c1bkJqb0dS /app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCRXM5cFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--71588e8150ee032fe3b95f492f9495bf7d13dfd3/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdDRG9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2RkhKbGMybDZaVjkwYjE5c2FXMXBkRnNIYVFJNEJEQTZDbk5oZG1WeWV3WTZDbk4wY21sd1ZBPT0iLCJleHAiOm51bGwsInB1ciI6InZhcmlhdGlvbiJ9fQ==--7535ef66ff04b52d1ea165e904a77a64f9cc7389/4.%20OTO%201%20Buy%20One%20Plus%20One%20Free.png"], "iframes": []}, {"title": "Downsell #1", "text": "Lesson 12 of 18 Downsell #1 OTO 2 (Downsell): \"75% Instant Discount\" If you wait or attempt to decline OTO 1, the page shifts to: \"Oh my God, Ian! Ok I understand. It might still feel too expensive. But it's unfair to leave you without insane benefits...\" The offer drops to: $14.50 (75% off from $57.99) - Same social proof comments - Even more aggressive urgency with countdown", "images": ["https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCRDQrcFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--0288713f820cc03e9c1282de1f3c60213ec5b608/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdDRG9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2RkhKbGMybDZaVjkwYjE5c2FXMXBkRnNIYVFJNEJEQTZDbk5oZG1WeWV3WTZDbk4wY21sd1ZBPT0iLCJleHAiOm51bGwsInB1ciI6InZhcmlhdGlvbiJ9fQ==--7535ef66ff04b52d1ea165e904a77a64f9cc7389/5.%20OTO%202%20Downsell%20Page.png"], "iframes": []}, {"title": "Thank You Page", "text": "Lesson 13 of 18 Thank You Page Final order total: $49.49 (Biofilm Probiotic $34.99 + Vaginal Probiotic $14.50) - Total savings displayed: $57.79 - Subscription auto-enrolled for both items On the thank you page, \"Evelyn, the founder\" runs a survey: \"Hey, my queen! I'm Evelyn, the founder of Nuora. Every month, I send $200 to ladies who answer these QUICK questions. First question: How excited are you about trying Nuora?\" The incentive ($200/month to random respondents) is a smart move to boost completion rates. They also offer a 14-day Daily5 sample (a different supplement) through a quiz, which serves as both a cross-sell and a data collection mechanism.", "images": ["https://app.circle.so/rails/active_storage/representations/redirect/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaHBCT0UrcFFvPSIsImV4cCI6bnVsbCwicHVyIjoiYmxvYl9pZCJ9fQ==--40302e11b64d23298252ef1376dbd4f472e00890/eyJfcmFpbHMiOnsibWVzc2FnZSI6IkJBaDdDRG9MWm05eWJXRjBTU0lJY0c1bkJqb0dSVlE2RkhKbGMybDZaVjkwYjE5c2FXMXBkRnNIYVFJNEJEQTZDbk5oZG1WeWV3WTZDbk4wY21sd1ZBPT0iLCJleHAiOm51bGwsInB1ciI6InZhcmlhdGlvbiJ9fQ==--7535ef66ff04b52d1ea165e904a77a64f9cc7389/6.%20Thank%20You%20Page%20(Blurred).png"], "iframes": []}]}, {"name": "Takeaways", "lessons": [{"title": "Funnel Takeaways", "text": "Lesson 14 of 18 Funnel Takeaways 1. One mechanism, relentlessly repeated. Every single ad, across all four pages, leads with the same mechanism: biofilm dissolution through bromelain. They do not try to invent new angles. They found the one thing that resonates, the science behind why nothing else works, and they hammer it from every direction: authority figures, UGC creators, animations, long-form VSLs, and advertorials. 2. The multi-page strategy is about audience segmentation, not just risk. Nuora main page speaks to the general audience. Alicia Darling targets women who respond to authority figures. Dr. Destiny Robinson speaks specifically to Black women. Grace Lindsay drives traffic to native advertorials. Each page is a different door into the same funnel. 3. The advertorial through top-health-insider.com is their most sophisticated asset. A board-certified OB-GYN reviewing the product on what appears to be an independent health site. The funnels that look native definitely win a lot at scale because they can capture audiences that are both skeptical and non-skeptical. 4. The founder birthday OTO is genuinely creative. \"602 = 06/02 = February 6th = my birthday\" is the kind of OTO copy that makes you smile instead of feeling sold to. It transforms a standard BOGO upsell into a personal moment with the founder. Every brand should study this as an alternative to the generic \"WAIT! Before you go...\" post purchase page. 5. They are leaving money on the table with email at 1.31%. This is the biggest gap in the funnel. At 233K monthly visits with a gamified pop-up capturing emails and phone numbers, they should be driving significantly more revenue through Klaviyo flows. If they built out a proper welcome series, abandon cart, post-purchase, and win-back sequence, email could easily be 10-15% of traffic within 90 days. 6. No TikTok and no Amazon is a risk. When you have a product this easy to copy (gummies in a pouch), not being on TikTok and Amazon means copycats will fill that space. Someone searching \"nuora\" on TikTok or Amazon should find Nuora, not a knock-off brand with similar packaging and lower prices. 7. The pre-checked subscription is a double-edged sword. It likely boosts subscription enrollment rates, but \"it's very difficult to understand that I am actually subscribing because this almost looks like just a check mark.\" This can drive chargebacks and trust issues. The short-term revenue gain may not be worth the long-term customer satisfaction cost. 8. 67.3% of ad traffic to one PDP is both a strength and a vulnerability. It means they have a clear winner and they are scaling it hard. But it also means a single page change, policy violation, or conversion dip affects two-thirds of their paid acquisition. Testing a second winner LP should be a priority. 9. Their ad longevity is exceptional. Multiple ads running 200+ days. \"BUY 1 GET 1 FREE\" at 237 days. \"PRICE GOES BACK UP IN 2 HOURS\" at 237 days. This tells you the creative is not burning out, which means either the audience is large enough to sustain frequency, or the ads are genuinely engaging enough that people do not fatigue on them. 10. The 65% off front-end pricing is strategic for a skeptical audience. The deep discount removes the financial risk for a custo let activeType = "all";

function typeCounts(){
  const c={}; DATA.funnels.forEach(f=>{c[f.type]=(c[f.type]||0)+1});
  return c;
}
function renderFilters(){
  const c=typeCounts();
  const types=Object.keys(c).sort((a,b)=>c[b]-c[a]);
  const host=document.getElementById("filters");
  const all=`<span class="pill ${activeType==='all'?'on':''}" data-t="all">Tất cả ${DATA.funnels.length}</span>`;
  host.innerHTML=all+types.map(t=>`<span class="pill ${activeType===t?'on':''}" data-t="${t}">${t} ${c[t]}</span>`).join("");
  host.querySelectorAll(".pill").forEach(p=>p.onclick=()=>{activeType=p.dataset.t;renderFilters();renderGrid();});
}
function renderGrid(){
  const g=document.getElementById("grid");
  const list=DATA.funnels.filter(f=>activeType==="all"||f.type===activeType);
  g.innerHTML=list.map((f,idx)=>`
    <div class="card" data-slug="${f.slug}">
      <div class="badge ${f.done?'':'todo'}">${f.done?'✓ Full':'· list'}</div>
      <div class="em">${f.emoji||'📋'}</div>
      <div class="nm">${f.name}</div>
      <div class="ty">${f.rawType||f.type}</div>
    </div>`).join("");
  g.querySelectorAll(".card").forEach(c=>c.onclick=()=>openDetail(c.dataset.slug));
}
function esc(s){return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function openDetail(slug){
  const f=DATA.funnels.find(x=>x.slug===slug);
  const host=document.getElementById("detailHost");
  if(!f.done||!f.sections){
    host.innerHTML=`<div class="det open"><div class="det-hd"><span class="em">${f.emoji}</span><div><h2>${f.name}</h2><div class="web">${f.rawType} · chưa scrape chi tiết</div></div><span class="close" onclick="document.getElementById('detailHost').innerHTML=''">✕</span></div><div style="padding:18px" class="empty">Breakdown chi tiết chưa được scrape. Mở bản gốc: <a href="${f.url}" target="_blank">${f.url}</a></div></div>`;
    host.scrollIntoView({behavior:"smooth"});return;
  }
  const secs=f.sections.map((s,si)=>`
    <div class="sec">
      <div class="sec-h" onclick="this.parentNode.querySelectorAll('.les').forEach(l=>l.classList.toggle('open'))">▸ ${s.name} (${s.lessons.length})</div>
      ${s.lessons.map(l=>`

          <div class="les-x">${esc(l.text)}</div>
          ${(l.images||[]).map(im=>`<img src="${im}" loading="lazy">`).join("")}
          ${(l.iframes||[]).map(fr=>`<iframe src="${fr}" loading="lazy" allowfullscreen></iframe>`).join("")}
        </div>`).join("")}
    </div>`).join("");
  host.innerHTML=`<div class="det open">
    <div class="det-hd"><span class="em">${f.emoji}</span><div><h2>${f.name}</h2><div class="web">${f.rawType} · <a href="https://${f.website}" target="_blank">${f.website||''}</a></div></div><span class="close" onclick="document.getElementById('detailHost').innerHTML=''">✕</span></div>
    ${secs}
  </div>`;
  host.scrollIntoView({behavior:"smooth"});
}
